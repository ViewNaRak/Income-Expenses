<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Income-Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>💰 ผู้ช่วยบันทึกรายรับ-รายจ่าย</h2>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                สวัสดีจ้าา! วันนี้มีรายรับหรือรายจ่ายอะไรเอ๋ย บอกมาได้เลยน้าา  หรือ สรุปยอดวันนี้ให้หน่อยก็ได้นะ! 😊
            </div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
